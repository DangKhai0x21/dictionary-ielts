        // --- BƯỚC 1: QUÉT FILE TỪ GITHUB API ---
        async function loadGitHubFiles() {
            try {
                // Fetch danh sách file từ Repo của bạn
                const response = await fetch('https://api.github.com/repos/DangKhai0x21/auto-listening/contents/audio-files');
                if (!response.ok) throw new Error('API Rate Limit hoặc Repo không đúng');
                
                const data = await response.json();
                const mp3Files = data.filter(file => file.name.toLowerCase().endsWith('.mp3'));

                if(mp3Files.length === 0) {
                    throw new Error('Thư mục trống hoặc không chứa file .mp3');
                }

                // Phân tích tên file động bằng Regex chuẩn hóa
                mp3Files.forEach(file => {
                    const match = file.name.match(/Cam\s*(\d+)\s*[\–\-]\s*Test\s*(\d+)\s*[\–\-]\s*(Section|Part)\s*(\d+)/i);
                    if (match) {
                        const c = 'C' + match[1];
                        const t = 'T' + match[2];
                        const p = 'P' + match[4];
                        const key = `${c}_${t}_${p}`;

                        if (!dbTree[c]) dbTree[c] = {};
                        if (!dbTree[c][t]) dbTree[c][t] = [];
                        if (!dbTree[c][t].includes(p)) dbTree[c][t].push(p);

                        // Lưu lại link tải trực tiếp từ GitHub cấp
                        audioFilesMap[key] = {
                            name: file.name,
                            download_url: file.download_url
                        };
                    }
                });

                repoStatus.innerHTML = `<span class="text-emerald-400"><i class="fa-solid fa-circle-check"></i> Đã đồng bộ ${mp3Files.length} file audio trực tiếp!</span>`;
                buildAppStructure();

            } catch (error) {
                console.warn("GitHub API lỗi/giới hạn lượt gọi, chuyển sang nạp danh sách dự phòng...", error);
                repoStatus.innerHTML = `<span class="text-amber-400"><i class="fa-solid fa-triangle-exclamation"></i> Chế độ dự phòng (Bị giới hạn API)</span>`;
                generateFallbackTree();
            }
        }

        // Tạo cây dữ liệu dự phòng nếu GitHub API bị chặn/quá tải lượt gọi
        function generateFallbackTree() {
            Object.keys(LEAN_DATA_BASE).forEach(key => {
                const [c, t, p] = key.split('_');
                if (!dbTree[c]) dbTree[c] = {};
                if (!dbTree[c][t]) dbTree[c][t] = [];
                dbTree[c][t].push(p);

                const camNum = c.substring(1);
                const testNum = t.substring(1);
                const partNum = p.substring(1);
                const fileName = `Cam ${camNum} – Test ${testNum} – Section ${partNum}.mp3`;

                audioFilesMap[key] = {
                    name: fileName,
                    download_url: `https://raw.githubusercontent.com/DangKhai0x21/auto-listening/main/audio-files/${encodeURIComponent(fileName)}`
                };
            });
            buildAppStructure();
        }

        // --- BƯỚC 2: XÂY DỰNG GIAO DIỆN DROPDOWN ---

            sortedKeys = Object.keys(audioFilesMap).sort((a, b) => {
                const parse = k => k.split('_').map(x => parseInt(x.substring(1)));
                const [ca, ta, pa] = parse(a);
                const [cb, tb, pb] = parse(b);
                return ca !== cb ? ca - cb : ta !== tb ? ta - tb : pa - pb;
            });

            // Mở khóa dropdowns
            camSelect.disabled = false;
            testSelect.disabled = false;
            partSelect.disabled = false;

            // Khởi tạo dữ liệu vào ô chọn Quyển Cam
            camSelect.innerHTML = Object.keys(dbTree).sort((a,b)=>parseInt(a.substring(1))-parseInt(b.substring(1)))
                .map(c => `<option value="${c}">Quyển ${c.substring(1)}</option>`).join('');
                
            updateTestOptions();
        }

        function updateTestOptions() {
            const selectedCam = camSelect.value;
            const tests = Object.keys(dbTree[selectedCam] || {}).sort((a,b)=>parseInt(a.substring(1))-parseInt(b.substring(1)));
            testSelect.innerHTML = tests.map(t => `<option value="${t}">Test ${t.substring(1)}</option>`).join('');
            updatePartOptions();
        }

        function updatePartOptions() {
            const selectedCam = camSelect.value;
            const selectedTest = testSelect.value;
            const parts = (dbTree[selectedCam]?.[selectedTest] || []).sort((a,b)=>parseInt(a.substring(1))-parseInt(b.substring(1)));
            partSelect.innerHTML = parts.map(p => `<option value="${p}">Part/Sec ${p.substring(1)}</option>`).join('');
            renderCurrentAudio();
        }

        // --- BƯỚC 3: PHÁT NHẠC TRỰC TIẾP ---
        function renderCurrentAudio() {
            const key = `${camSelect.value}_${testSelect.value}_${partSelect.value}`;
            const audioData = audioFilesMap[key];
            const songNguData = LEAN_DATA_BASE[key];
            
            contentBlock.classList.add('hidden');
            contentText.innerHTML = '';
            
            if (audioData) {
                // Tách chữ hiển thị tiêu đề đẹp mắt
                const displayTitle = audioData.name.replace('.mp3', '');
                currentTitle.textContent = displayTitle;
                audioFileName.textContent = audioData.name;
                
                // Đưa trực tiếp đường dẫn gốc vào trình phát nhạc chuẩn HTML5
                audioPlayer.src = audioData.download_url;
                audioPlayer.load();
                
                currentTargetUrl = songNguData ? songNguData.url : "";
            } else {
                currentTitle.textContent = "Không tìm thấy file tương ứng";
                audioFileName.textContent = "--";
                audioPlayer.src = "";
                currentTargetUrl = "";
            }

            // Cập nhật trạng thái nút Prev/Next
            const currentIndex = sortedKeys.indexOf(key);
            prevBtn.disabled = currentIndex <= 0;
            nextBtn.disabled = currentIndex >= sortedKeys.length - 1 || currentIndex === -1;
        }

        // --- BƯỚC 4: BÓC TÁCH NỘI DUNG SONG NGỮ ---
        webLink.addEventListener('click', function(event) {
            event.preventDefault();
            if (!currentTargetUrl) {
                alert("Bài học này chưa có liên kết dữ liệu song ngữ tương ứng!");
                return;
            }

            contentBlock.classList.remove('hidden');
            contentText.innerHTML = `
                <div class="text-center text-amber-400 py-6">
                    <i class="fa-solid fa-spinner animate-spin mr-2 text-lg"></i> Đang tải tài liệu song ngữ từ ieltssongngu.com...
                </div>
            `;

            fetch(currentTargetUrl)
            .then(response => {
                if (!response.ok) throw new Error('Mạng lỗi');
                return response.text();
            })
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const mainArticle = doc.querySelector('.entry-content') || doc.querySelector('article') || doc.body;
                
                // Dọn dẹp rác quảng cáo
                mainArticle.querySelectorAll('script, style, iframe, header, footer, nav, .sharedaddy').forEach(el => el.remove());
                contentText.innerHTML = mainArticle.innerHTML;
                contentBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
            })
            .catch(error => {
                console.error(error);
                contentText.innerHTML = `
                    <div class="p-3 border border-rose-800/50 bg-rose-950/30 rounded-xl text-center">
                        <p class="text-rose-400 font-bold mb-1"><i class="fa-solid fa-circle-exclamation mr-1"></i> Không thể bóc dữ liệu tự động do chính sách bảo mật CORS</p>
                        <div class="mt-3 bg-slate-950 p-2.5 rounded-lg text-xs text-amber-400 text-left">
                            <b>💡 Cách sửa lỗi cực dễ:</b> Bạn hãy cài đặt và bật tiện ích mở rộng (Extension) có tên là <b>"Allow CORS: Access-Control-Allow-Origin"</b> trên Chrome/Edge lên, sau đó quay lại bấm nút này là dữ liệu sẽ hiện ra mượt mà!
                        </div>
                    </div>
                `;
            });
        });

        // Sự kiện điều hướng
        camSelect.addEventListener('change', updateTestOptions);
        testSelect.addEventListener('change', updatePartOptions);
        partSelect.addEventListener('change', renderCurrentAudio);

        function navigate(direction) {
            const key = `${camSelect.value}_${testSelect.value}_${partSelect.value}`;
            const currentIndex = sortedKeys.indexOf(key);
            const targetIndex = currentIndex + direction;

            if (targetIndex >= 0 && targetIndex < sortedKeys.length) {
                const targetKey = sortedKeys[targetIndex];
                const [c, t, p] = targetKey.split('_');
                
                camSelect.value = c;
                updateTestOptions();
                testSelect.value = t;
                updatePartOptions();
                partSelect.value = p;
                renderCurrentAudio();
                
                audioPlayer.play().catch(() => console.log("Chờ người dùng nhấn nút chạy âm thanh"));
            }
        }

        prevBtn.addEventListener('click', () => navigate(-1));
        nextBtn.addEventListener('click', () => navigate(1));

        // Khởi động ứng dụng
        loadGitHubFiles();
    </script>
</body>
</html>
