<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Listening Audio Player & Map</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-6 rounded-2xl shadow-2xl w-full max-w-2xl border border-slate-700/50">
        <div class="flex items-center gap-3 mb-6 border-b border-slate-700 pb-4">
            <div class="p-3 bg-indigo-600 rounded-xl text-white shadow-lg shadow-indigo-500/30">
                <i class="fa-solid fa-headphones-simple text-2xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">IELTS Listening Map</h1>
                <p class="text-xs text-slate-400">Audio phát trực tiếp từ GitHub repository</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-6">
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">Cambridge</label>
                <select id="camSelect" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm focus:outline-none focus:border-indigo-500 cursor-pointer"></select>
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">Test</label>
                <select id="testSelect" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm focus:outline-none focus:border-indigo-500 cursor-pointer"></select>
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">Part / Section</label>
                <select id="partSelect" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm focus:outline-none focus:border-indigo-500 cursor-pointer"></select>
            </div>
        </div>

        <div class="bg-slate-950/60 rounded-xl p-5 border border-slate-800 mb-6 text-center">
            <div id="currentTitle" class="text-lg font-semibold text-indigo-300 mb-1">Đang tải dữ liệu...</div>
            <div id="audioFileName" class="text-xs font-mono text-slate-500 mb-4 flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-link text-[10px]"></i> <span>--</span>
            </div>

            <audio id="audioPlayer" controls class="w-full accent-indigo-500 bg-slate-900 rounded-lg"></audio>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 items-center justify-between">
            <div class="flex gap-2 w-full sm:w-auto">
                <button id="prevBtn" class="flex-1 sm:flex-initial bg-slate-700 hover:bg-slate-600 active:scale-95 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition flex items-center justify-center gap-2 disabled:opacity-40 disabled:pointer-events-none">
                    <i class="fa-solid fa-chevron-left"></i> Bài trước
                </button>
                <button id="nextBtn" class="flex-1 sm:flex-initial bg-slate-700 hover:bg-slate-600 active:scale-95 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition flex items-center justify-center gap-2 disabled:opacity-40 disabled:pointer-events-none">
                    Bài tiếp <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>

            <button id="webLink" class="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white px-5 py-2.5 rounded-xl text-sm font-medium transition flex items-center justify-center gap-2 shadow-lg shadow-emerald-600/20 cursor-pointer">
                <i class="fa-solid fa-cloud-arrow-down"></i> Xem câu hỏi & Song ngữ
            </button>
        </div>

        <div id="contentBlock" class="mt-6 border-t border-slate-700 pt-4 hidden">
            <h4 class="text-sm font-semibold text-indigo-400 mb-2 flex items-center gap-2">
                <i class="fa-solid fa-file-lines"></i> Nội dung chi tiết bài học:
            </h4>
            <div id="contentText" class="bg-slate-900/90 rounded-xl p-4 text-sm text-slate-300 max-h-96 overflow-y-auto leading-relaxed border border-slate-800 space-y-4">
                </div>
        </div>
    </div>

        // Danh sách các key theo thứ tự để điều hướng qua nút Next/Prev
        const sortedKeys = Object.keys(LEAN_DATA_BASE).sort((a, b) => {
            const parse = k => k.split('_').map(x => parseInt(x.substring(1)));
            const [ca, ta, pa] = parse(a);
            const [cb, tb, pb] = parse(b);
            return ca !== cb ? ca - cb : ta !== tb ? ta - tb : pa - pb;
        });

        // DOM Elements
        const camSelect = document.getElementById('camSelect');
        const testSelect = document.getElementById('testSelect');
        const partSelect = document.getElementById('partSelect');
        const currentTitle = document.getElementById('currentTitle');
        const audioFileName = document.querySelector('#audioFileName span');
        const audioPlayer = document.getElementById('audioPlayer');
        const webLink = document.getElementById('webLink');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const contentBlock = document.getElementById('contentBlock');
        const contentText = document.getElementById('contentText');

        let currentTargetUrl = "";
        let currentFallbackIndex = 0;
        let formatsToTry = [];

        // Cấu trúc cây menu
        const dbTree = {};
        sortedKeys.forEach(key => {
            const [c, t, p] = key.split('_');
            if (!dbTree[c]) dbTree[c] = {};
            if (!dbTree[c][t]) dbTree[c][t] = [];
            dbTree[c][t].push(p);
        });

        function initDropdowns() {
            camSelect.innerHTML = Object.keys(dbTree).map(c => `<option value="${c}">Quyển ${c.substring(1)}</option>`).join('');
            updateTestOptions();
        }

        function updateTestOptions() {
            const selectedCam = camSelect.value;
            const tests = Object.keys(dbTree[selectedCam] || {});
            testSelect.innerHTML = tests.map(t => `<option value="${t}">Test ${t.substring(1)}</option>`).join('');
            updatePartOptions();
        }

        function updatePartOptions() {
            const selectedCam = camSelect.value;
            const selectedTest = testSelect.value;
            const parts = dbTree[selectedCam]?.[selectedTest] || [];
            partSelect.innerHTML = parts.map(p => `<option value="${p}">Part ${p.substring(1)}</option>`).join('');
            renderCurrentMatch();
        }

        // Render thông tin và xử lý link nhạc tự động từ GitHub
        function renderCurrentMatch() {
            const key = `${camSelect.value}_${testSelect.value}_${partSelect.value}`;
            const data = LEAN_DATA_BASE[key];
            
            contentBlock.classList.add('hidden');
            contentText.innerHTML = '';
            
            if (data) {
                currentTitle.textContent = data.title;
                currentTargetUrl = data.url;
                
                const camNum = camSelect.value.substring(1);
                const testNum = testSelect.value.substring(1);
                const partNum = partSelect.value.substring(1);
                
                // Mảng chứa các biến thể đặt tên file để quét lần lượt nếu dính lỗi 404
                formatsToTry = [
                    `Cam ${camNum} – Test ${testNum} – Section ${partNum}.mp3`, // Dạng en-dash '–' Section (mặc định)
                    `Cam ${camNum} – Test ${testNum} – Part ${partNum}.mp3`,    // Dạng en-dash '–' Part
                    `Cam ${camNum} - Test ${testNum} - Section ${partNum}.mp3`, // Dạng gạch ngắn '-' Section
                    `Cam ${camNum} - Test ${testNum} - Part ${partNum}.mp3`     // Dạng gạch ngắn '-' Part
                ];
                
                currentFallbackIndex = 0;
                tryLoadAudio();
            }

            const currentIndex = sortedKeys.indexOf(key);
            prevBtn.disabled = currentIndex <= 0;
            nextBtn.disabled = currentIndex >= sortedKeys.length - 1 || currentIndex === -1;
        }

        // Hàm nạp source nhạc từ CDN Raw của GitHub
        function tryLoadAudio() {
            if (currentFallbackIndex < formatsToTry.length) {
                const baseUrl = "https://raw.githubusercontent.com/DangKhai0x21/auto-listening/main/audio-files/";
                const fileName = formatsToTry[currentFallbackIndex];
                
                audioFileName.textContent = fileName;
                // encodeURIComponent để giải quyết các khoảng trắng và ký tự đặc biệt như dấu gạch ngang
                audioPlayer.src = baseUrl + encodeURIComponent(fileName);
                audioPlayer.load();
            } else {
                audioFileName.textContent = "❌ Không tìm thấy file này trên kho GitHub!";
            }
        }

        // Cơ chế bẫy lỗi: Nếu file dạng này lỗi, chuyển sang cấu hình dạng tên tiếp theo
        audioPlayer.addEventListener('error', () => {
            if (audioPlayer.src && currentFallbackIndex < formatsToTry.length - 1) {
                currentFallbackIndex++;
                console.log(`Lỗi tải, chuyển sang thử mẫu tên file dự phòng số ${currentFallbackIndex + 1}...`);
                tryLoadAudio();
                audioPlayer.play().catch(() => {});
            }
        });

        // --- FETCH DỮ LIỆU BÀI HỌC SONG NGỮ ---
        webLink.addEventListener('click', function(event) {
            event.preventDefault();

            if (!currentTargetUrl) return;

            contentBlock.classList.remove('hidden');
            contentText.innerHTML = `
                <div class="text-center text-amber-400 py-6">
                    <i class="fa-solid fa-spinner animate-spin mr-2 text-lg"></i> Đang bốc dữ liệu từ ieltssongngu.com, đợi tí...
                </div>
            `;

            fetch(currentTargetUrl)
            .then(response => {
                if (!response.ok) throw new Error('Mạng lỗi hoặc không phản hồi');
                return response.text();
            })
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const mainArticle = doc.querySelector('.entry-content') || doc.querySelector('article') || doc.body;
                
                mainArticle.querySelectorAll('script, style, iframe, header, footer, nav, .sharedaddy').forEach(el => el.remove());
                contentText.innerHTML = mainArticle.innerHTML;
                
                contentBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
            })
            .catch(error => {
                console.error(error);
                contentText.innerHTML = `
                    <div class="p-3 border border-rose-800/50 bg-rose-950/30 rounded-xl text-center">
                        <p class="text-rose-400 font-bold mb-1"><i class="fa-solid fa-circle-exclamation mr-1"></i> Không thể bốc dữ liệu trực tiếp do chặn CORS</p>
                        <div class="mt-3 bg-slate-950 p-2.5 rounded-lg text-xs text-amber-400 text-left">
                            <b>💡 Cách giải quyết nhanh gọn:</b> Hãy bật tiện ích <b>Allow CORS</b> trên trình duyệt của bạn lên rồi bấm lại nút này nhé!
                        </div>
                    </div>
                `;
            });
        });

        // Điều hướng chọn
        camSelect.addEventListener('change', updateTestOptions);
        testSelect.addEventListener('change', updatePartOptions);
        partSelect.addEventListener('change', renderCurrentMatch);

        function navigate(direction) {
            const key = `${camSelect.value}_${testSelect.value}_${partSelect.value}`;
            const currentIndex = sortedKeys.indexOf(key);
            const targetIndex = currentIndex + direction;

            if (targetIndex >= 0 && targetIndex < sortedKeys.length) {
                const targetKey = sortedKeys[targetIndex];
                const [c, t, p] = targetKey.split('_');
                
                camSelect.value = c;
                updateTestOptions();
                testSelect.value = t;
                updatePartOptions();
                partSelect.value = p;
                renderCurrentMatch();
                
                audioPlayer.play().catch(() => console.log("Chờ tương tác để auto-play."));
            }
        }

        prevBtn.addEventListener('click', () => navigate(-1));
        nextBtn.addEventListener('click', () => navigate(1));

        initDropdowns();
    </script>
</body>
</html>
